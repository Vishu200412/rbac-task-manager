
version: "3.9"

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────

  postgres:

    image: postgres:15-alpine

    container_name: taskapp_postgres

    restart: unless-stopped

    environment:

      POSTGRES_USER: taskapp_user

      POSTGRES_PASSWORD: taskapp123

      POSTGRES_DB: taskapp_db

    volumes:

      - postgres_data:/var/lib/postgresql/data

    ports:

      - "5433:5432"

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U taskapp_user -d taskapp_db"]

      interval: 10s

      timeout: 5s

      retries: 5

  # ── Redis Cache ───────────────────────────────────────────────────────────

  redis:

    image: redis:7-alpine

    container_name: taskapp_redis

    restart: unless-stopped

    ports:

      - "6380:6379"

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 10s

      timeout: 5s

      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────

  backend:

    build:

      context: ./backend

      dockerfile: Dockerfile

    container_name: taskapp_backend

    restart: unless-stopped

    env_file:

      - ./backend/.env.docker

    ports:

      - "8000:8000"

    volumes:

      - ./backend/logs:/app/logs

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

      interval: 15s

      timeout: 5s

      retries: 5

  # ── React Frontend ────────────────────────────────────────────────────────

  frontend:

    build:

      context: ./frontend

      dockerfile: Dockerfile

    container_name: taskapp_frontend

    restart: unless-stopped

    ports:

      - "3000:80"

    depends_on:

      - backend

volumes:

  postgres_data:

